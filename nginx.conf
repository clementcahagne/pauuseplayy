server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets with extensions: serve as-is or return real 404
    # (PDF, images, fonts, etc. should never fall back to index.html)
    location ~* \.(pdf|png|jpg|jpeg|gif|svg|webp|ico|css|js|woff|woff2|ttf|eot|mp4|mp3|zip)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # Force download with proper MIME type for PDFs
    location ~* \.pdf$ {
        try_files $uri =404;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=86400";
        types { application/pdf pdf; }
    }

    # Pages: try clean URLs (foo → foo.html)
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
